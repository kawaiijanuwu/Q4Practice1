<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Practice 1</title>
</head>
<body>
    <h1>Javascript Conditional Statements</h1>

    <input type="text" id="age" class="form-control" placeholder="type here...">
    <button class="btn btn-info" onclick="checkage()"></button>

    <script>

    function checkage(){

    var age = document.getElementbyId().value;
        if (age < 18){
            alert("You are underage.");
        }
        else if (age > 18){
            alert("You are of legal age.");
        }
        else {
            alert("Your age would not be classified.")
        }
    }
    </script>
</body>
</html>
