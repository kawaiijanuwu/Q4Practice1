<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Practice 1</title>
</head>
<body>
    <h1>Javascript Conditional Statements</h1>

    <input type="text" id="age" class="form-control" placeholder="type here...">
    <button class="btn btn-info" onclick="checkage()">Check</button>

    <script>

    function checkage(){

        var age = Number(document.getElementById("age").value);

        if(isNaN(age) || age < 0 ){
            alert("Please input a valid number.");
            return;
        }
        
        if (age < 18){
            alert("You are underage.");
        }
        else {
            alert("You are of legal age.");
        }

    }

    </script>
</body>
</html>
